version: '3.8'

services:
  webui-backend:
    build: ./backend
    container_name: surge-webui-backend
    ports:
      - "5001:5001"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-surge-production-secret-key-change-this}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///surge.db}
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - surge_data:/app/data
    working_dir: /app
    command: python app.py
    networks:
      - surge-network
    
  webui-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=https://surge.video
    container_name: surge-webui-frontend
    ports:
      - "3100:80"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    restart: unless-stopped
    depends_on:
      - webui-backend
    networks:
      - surge-network

  # Nginx reverse proxy for SSL termination
  nginx:
    image: nginx:alpine
    container_name: surge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./local-daemon:/var/www/html/daemon:ro  # Serve daemon files
    depends_on:
      - webui-frontend
      - webui-backend
    restart: unless-stopped
    networks:
      - surge-network

  # Redis for session storage (optional but recommended for production)
  redis:
    image: redis:alpine
    container_name: surge-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - surge-network

volumes:
  surge_data:
  redis_data:

networks:
  surge-network:
    driver: bridge