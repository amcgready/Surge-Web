name: Deploy surge.video (SFTP)

on:
  push:
    branches: [ "main" ]   # deploys only when pushing to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Uncomment if you build (React/Vite/etc) and change local-dir below
      # - name: Build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Preflight SSH check (list target)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}   # use the secret directly
          timeout: 60s
          command_timeout: 5m
          script: |
            echo "Target: ${{ secrets.SFTP_TARGET }}"
            mkdir -p "${{ secrets.SFTP_TARGET }}"
            ls -la "${{ secrets.SFTP_TARGET }}"

      - name: SFTP deploy via SSH key
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          protocol: sftp
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          local-dir: ./            # change to ./dist if you built above
          server-dir: ${{ secrets.SFTP_TARGET }}
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            .git*
            .github/**
            node_modules/**
            **/.DS_Store
