name: Deploy surge.video (SFTP)

on:
  push:
    branches: [ "public" ]   # only deploy when pushing to the public branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # If your site requires a build (React/Vite/etc), uncomment below
      # - name: Build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Write SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Preflight SSH check (list target)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          key_path: ~/.ssh/id_ed25519
          script: |
            echo "Target: ${{ secrets.SFTP_TARGET }}"
            mkdir -p "${{ secrets.SFTP_TARGET }}"
            ls -la "${{ secrets.SFTP_TARGET }}"

      - name: SFTP deploy via SSH key
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          protocol: sftp
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          local-dir: ./            # change to ./dist if you build
          server-dir: ${{ secrets.SFTP_TARGET }}
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            .git*
            .github/**
            node_modules/**
            **/.DS_Store
