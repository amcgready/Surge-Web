name: Deploy surge.video (SFTP)

# What this does:
#   1. Builds the static React wizard from frontend/src
#   2. Confirms the SFTP target is reachable
#   3. Uploads ONLY frontend/build/* to the web root (not the whole repo)
#
# Important: never deploys './*'. The repo contains source, tests,
# docs, and the orchestrator that ships INSIDE deploy bundles users
# download — none of which belongs on the public site. Earlier
# iterations of this workflow uploaded the whole repo and shipped a
# stale prebuilt bundle that contained the long-removed auth UI; the
# build-then-deploy split below prevents that recurring.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No `cache: 'npm'` — that requires a clean lockfile. Build
          # is fast enough to not need npm caching for a small SPA.

      - name: Build wizard
        working-directory: frontend
        env:
          # GitHub Actions auto-sets CI=true, which makes
          # react-scripts' bundled ESLint phase treat any warning as
          # a build error. Surge has a handful of harmless unused-
          # arg warnings (function signatures kept for symmetry).
          # Override CI=false here so warnings remain warnings; the
          # build itself still runs in production mode.
          CI: false
        run: |
          # Use `npm install` rather than `npm ci` — the lockfile
          # has drifted from package.json a few times during the
          # auth-rip cleanup and pinning the deploy to a strict
          # lockfile match isn't worth blocking releases over.
          # `install` self-heals lockfile drift; the worst-case
          # cost is a slightly different transitive resolution
          # between local and CI, which doesn't matter for a
          # static-site deploy.
          npm install --no-audit --no-fund --no-progress
          npm run build
          # Sanity check: the built bundle should NOT contain the
          # old auth UI anymore. If any of these strings come back,
          # there's a regression and we want the deploy to fail
          # rather than ship login screens to surge.video.
          if grep -qE "AuthComponent|PasswordReset|EmailVerification|/api/login|surge-daemon" build/static/js/*.js; then
            echo "::error::Built bundle contains references to removed auth code"
            exit 1
          fi
          echo "Built bundle size:"
          du -sh build/

      - name: Write SSH key and known_hosts
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: SSH key sanity check
        # Diagnostic — narrows down "Permission denied" causes.
        # Reads the *private* key but only emits public-derived info,
        # so it's safe to log. After this step succeeds in a run,
        # you can usually drop it back out.
        run: |
          echo "=== Key file ==="
          ls -la ~/.ssh/id_ed25519 || { echo "MISSING"; exit 1; }
          echo
          echo "=== Key parses? (fingerprint, paste-safe) ==="
          ssh-keygen -l -f ~/.ssh/id_ed25519 \
            || { echo "ERROR: secret SSH_PRIVATE_KEY is malformed"; exit 1; }
          echo
          echo "=== Public key derived from private key ==="
          echo "Append this single line to ~/.ssh/authorized_keys"
          echo "on the SFTP server (as the SFTP user) if it isn't"
          echo "already there:"
          echo "---"
          ssh-keygen -y -f ~/.ssh/id_ed25519 \
            || { echo "ERROR: could not derive pubkey"; exit 1; }
          echo "---"
          echo
          echo "=== known_hosts entries ==="
          wc -l ~/.ssh/known_hosts 2>/dev/null || echo "(no known_hosts yet)"

      - name: Raw SSH preflight (auth + network)
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
        run: |
          # -vvv on the first attempt gives us the negotiation log so
          # we can see whether the server even *received* the key.
          # Look for "Offering public key:" followed by either
          # "Server accepts key:" (success) or "Authentications that
          # can continue:" (rejected — pubkey isn't on the server).
          ssh -vvv -o BatchMode=yes -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
              "${SSH_USER}@${SSH_HOST}" 'echo ok && whoami && pwd' 2>&1 | tail -80

      - name: Wipe target directory before upload
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
          TARGET:   ${{ secrets.SFTP_TARGET }}
        run: |
          # Clear the web root so old auth-era files (login.html,
          # register.html, stale main.<hash>.js bundles, etc.) don't
          # linger alongside the fresh build. We mkdir first in case
          # the target was never created.
          ssh -o BatchMode=yes -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
              "${SSH_USER}@${SSH_HOST}" \
              "mkdir -p '${TARGET}' && find '${TARGET}' -mindepth 1 -delete && ls -la '${TARGET}'"

      - name: SFTP deploy build/ only
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Only the static build artifacts. NOT './*'.
          local_path: ./frontend/build/*
          remote_path: ${{ secrets.SFTP_TARGET }}
          sftp_only: true
          exclude: |
            **/.DS_Store
