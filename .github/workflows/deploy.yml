name: Deploy surge.video (SFTP)

on:
  push:
    branches: [ "main" ]  # deploys on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # If you build (React/Vite/etc), uncomment and change local-dir to ./dist in the deploy step
      # - name: Build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Write SSH key and known_hosts
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts


      - name: Raw SSH preflight (auth + network)
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
        run: |
          ssh -o BatchMode=yes -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" 'echo ok && whoami && pwd'

      - name: Preflight list target
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USERNAME }}
          TARGET:   ${{ secrets.SFTP_TARGET }}
        run: |
          ssh -o BatchMode=yes -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "mkdir -p '${TARGET}' && ls -la '${TARGET}'"

      - name: SFTP deploy via SSH key
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          protocol: sftp
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          local-dir: ./            # change to ./dist if you built above
          server-dir: ${{ secrets.SFTP_TARGET }}
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            .git*
            .github/**
            node_modules/**
            **/.DS_Store
