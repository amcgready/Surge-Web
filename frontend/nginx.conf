server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Enable gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle React Router (catch-all). Surge is a static SPA — there
    # is no backend, so no /api/ proxy block. Any /api/* request is
    # vestigial from the old auth-era; let it 404 by default rather
    # than route it to a service that no longer exists.
    location / {
        try_files $uri $uri/ /index.html;
    }
}