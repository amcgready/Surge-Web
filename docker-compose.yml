services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: surge-postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-surge_db}
      - POSTGRES_USER=${DB_USER:-surge_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-surge_password}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - surge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-surge_user} -d ${DB_NAME:-surge_db}"]
      interval: 30s
      timeout: 10s
      retries: 5

  webui-backend:
    build: ./backend
    container_name: surge-webui-backend
    ports:
      - "5001:5001"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-surge-secret-key-change-in-production}
      - DATABASE_URL=postgresql://${DB_USER:-surge_user}:${DB_PASSWORD:-surge_password}@postgres:5432/${DB_NAME:-surge_db}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-surge_db}
      - DB_USER=${DB_USER:-surge_user}
      - DB_PASSWORD=${DB_PASSWORD:-surge_password}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@surge.video}
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker access
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - surge-network
    
  webui-frontend:
    build: ./frontend
    container_name: surge-webui-frontend
    ports:
      - "3100:3000"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    depends_on:
      - webui-backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules  # Anonymous volume to preserve node_modules
    networks:
      - surge-network

volumes:
  postgres_data:

networks:
  surge-network:
    driver: bridge
